{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container py-5">
    <div class="card auth-card mx-auto" style="max-width: 480px;">
        <div class="card-header border-0">
            <h4 class="mb-1 fw-bold"><i class="bi bi-shield-lock me-2"></i>Yeni Şifre</h4>
            <p class="text-muted mb-0">Hesabınız için yeni şifrenizi belirleyin.</p>
        </div>
        <div class="card-body p-4 p-md-5">
            {% if validlink %}
            <form method="POST">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold mt-3 shadow-sm">
                    Şifreyi Güncelle
                </button>
            </form>
            {% else %}
            <p class="text-muted mb-4">Bu şifre sıfırlama linki geçersiz veya süresi dolmuş.</p>
            <a href="{% url 'accounts:password_reset' %}" class="btn btn-primary rounded-pill px-4">Yeni Link İste</a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
