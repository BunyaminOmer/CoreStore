{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container py-5">
    <div class="card auth-card mx-auto" style="max-width: 480px;">
        <div class="card-header border-0">
            <h4 class="mb-1 fw-bold"><i class="bi bi-key me-2"></i>Şifre Sıfırlama</h4>
            <p class="text-muted mb-0">Hesabınıza bağlı e-posta adresini girin.</p>
        </div>
        <div class="card-body p-4 p-md-5">
            <form method="POST">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold mt-3 shadow-sm">
                    Sıfırlama Linki Gönder
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
