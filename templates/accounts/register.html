{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container py-5">
    <div class="card auth-card mx-auto" style="max-width: 550px;">
        <div class="card-header border-0 bg-primary text-white">
            <h4 class="mb-0 fw-bold"><i class="bi bi-person-plus me-2"></i>Kayıt Ol</h4>
        </div>
        <div class="card-body p-4 p-md-5">
            <form method="POST">
                {% csrf_token %}
                {{ form|crispy }}
                
                <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold mt-4 shadow-sm">
                    Kayıt İşlemini Tamamla
                </button>
            </form>
            
            <div class="text-center mt-4 pt-3 border-top">
                <p class="text-muted mb-0">Zaten hesabınız var mı? <a href="{% url 'accounts:login' %}" class="text-primary fw-bold text-decoration-none">Giriş Yapın</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
