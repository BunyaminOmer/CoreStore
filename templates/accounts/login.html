{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container py-5">
    <div class="card auth-card mx-auto" style="max-width: 450px;">
        <div class="card-header border-0">
            <h4 class="mb-0 fw-bold"><i class="bi bi-box-arrow-in-right me-2"></i>Giriş Yap</h4>
        </div>
        <div class="card-body p-4 p-md-5">
            <form method="POST">
                {% csrf_token %}
                {% if next %}
                    <input type="hidden" name="next" value="{{ next }}">
                {% endif %}
                {{ form|crispy }}
                
                <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold mt-4 shadow-sm">
                    Giriş Yap
                </button>
            </form>

            <div class="text-center mt-3">
                <a href="{% url 'accounts:password_reset' %}" class="text-muted fw-semibold text-decoration-none">
                    Şifremi unuttum
                </a>
            </div>
            
            <div class="text-center mt-4 pt-3 border-top">
                <p class="text-muted mb-0">Hesabınız yok mu? <a href="{% url 'accounts:register' %}" class="text-primary fw-bold text-decoration-none">Hemen Kayıt Olun</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
