{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container commerce-page py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="checkout-card">
                <h1 class="section-title mb-2">Geri Bildirim</h1>
                <p class="text-muted mb-4">Deneyiminizi, önerinizi veya yaşadığınız sorunu bize iletin.</p>
                <form method="POST">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary rounded-pill px-5 py-3 fw-bold">
                        <i class="bi bi-send me-2"></i>Gönder
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
