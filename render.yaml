databases:
  - name: corelogic-db
    plan: free
    databaseName: corelogic
    user: corelogic

services:
  - type: web
    plan: free
    name: corelogic-store
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn corelogic.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: corelogic-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 1
      - key: DOMAIN
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: REQUIRE_CLOUDINARY
        value: "False"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_SUPPORT_MODEL
        value: "gemini-3.5-flash"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_SUPPORT_MODEL
        value: "gpt-4.1-mini"
